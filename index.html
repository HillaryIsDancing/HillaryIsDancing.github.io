<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hindex</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">
    <header class="hero">

      <h1>
        Hindex
        <span class="bear-inline">ʕ•ᴥ•ʔ</span>
      </h1>

      <p class="subtitle">
        A searchable archive of Hillary's K-pop dance videos.
      </p>
    </header>

    <section class="toolbar">
      <input
        id="searchInput"
        type="text"
        placeholder="Search by song, artist, role, or location..."
      />

      <div class="board-buttons">
        <button id="toggleArtistMap" class="map-button" type="button">
          Show Artist Board
        </button>

        <button id="toggleRoleMap" class="map-button" type="button">
          Show Role Board
        </button>
      </div>
    </section>

    <section id="artistMapSection" class="artist-map-section hidden">
      <div class="artist-map-header">
        <div>
          <h2>Artist Board</h2>
          <p class="map-note">More videos, bigger cards, more love 💗</p>
        </div>

        <button id="clearArtistFilter" class="clear-filter-button" type="button">
          Clear Filter
        </button>
      </div>

      <div id="artistMap" class="artist-map"></div>
    </section>

    <section id="roleMapSection" class="artist-map-section hidden">
      <div class="artist-map-header">
        <div>
          <h2>Role Board</h2>
          <p class="map-note">See Hill's most frequent roles</p>
        </div>

        <button id="clearRoleFilter" class="clear-filter-button" type="button">
          Clear Filter
        </button>
      </div>

      <div id="roleMap" class="artist-map"></div>
    </section>

    <section id="count" class="count"></section>

    <section id="grid" class="grid"></section>

    <div class="load-more-wrap">
      <button id="loadMoreButton" class="load-more-button" type="button">
        Load More
      </button>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
